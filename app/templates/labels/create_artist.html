{% extends "base.html" %}
{% block title %}Новый артист{% endblock %}
{% block page_title %}Добавление артиста{% endblock %}
{% block content %}
<form method="POST"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<div class="form-group"><label>Имя *</label><input type="text" name="name" required class="form-control"></div>
<div class="form-group"><label>Роль</label><select name="role" class="form-control">{% for r in roles %}<option value="{{ r }}">{{ r }}</option>{% endfor %}</select></div>
<div class="form-actions"><a href="{{ url_for('labels.artists') }}" class="btn btn-ghost">Отмена</a><button type="submit" class="btn btn-primary">Добавить</button></div>
</form>
{% endblock %}
