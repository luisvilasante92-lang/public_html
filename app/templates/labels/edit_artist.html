{% extends "base.html" %}
{% block title %}Редактирование: {{ artist.name }}{% endblock %}
{% block page_title %}Редактирование артиста{% endblock %}
{% block content %}
<form method="POST"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<div class="form-group"><label>Имя *</label><input type="text" name="name" value="{{ artist.name }}" required class="form-control"></div>
<div class="form-group"><label>Роль</label><select name="role" class="form-control">{% for r in roles %}<option value="{{ r }}" {% if artist.role==r %}selected{% endif %}>{{ r }}</option>{% endfor %}</select></div>
<div class="form-actions"><a href="{{ url_for('labels.artists') }}" class="btn btn-ghost">Отмена</a><button type="submit" class="btn btn-primary">Сохранить</button></div>
</form>
{% endblock %}
