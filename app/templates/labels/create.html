{% extends "base.html" %}
{% block title %}Новый лейбл{% endblock %}
{% block page_title %}Создание лейбла{% endblock %}
{% block content %}
<form method="POST"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<div class="form-group"><label>Название *</label><input type="text" name="name" required class="form-control"></div>
<div class="form-group"><label>Копирайт *</label><input type="text" name="copyright" value="{{ default_copyright }}" required class="form-control" placeholder="© 2026 Название лейбла"></div>
<div class="form-actions"><a href="{{ url_for('labels.index') }}" class="btn btn-ghost">Отмена</a><button type="submit" class="btn btn-primary">Создать</button></div>
</form>
{% endblock %}
