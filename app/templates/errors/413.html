<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>413 - Файл слишком большой | LVR Music Publishing</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/favicon.svg') }}">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Manrope', sans-serif;
            background: #0f0f0f;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-page { text-align: center; padding: 2rem; }
        .error-code { font-size: 8rem; font-weight: 700; color: #f59e0b; line-height: 1; }
        .error-title { font-size: 1.5rem; margin: 1rem 0; color: #888; }
        .error-description { color: #666; margin-bottom: 2rem; }
        .btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.75rem 1.5rem; background: #00bea2; color: #000;
            text-decoration: none; border-radius: 8px; font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-code">413</div>
        <h1 class="error-title">Файл слишком большой</h1>
        <p class="error-description">Размер загружаемого файла превышает допустимый лимит</p>
        <a href="javascript:history.back()" class="btn"><span class="material-icons">arrow_back</span> Назад</a>
    </div>
</body>
</html>
