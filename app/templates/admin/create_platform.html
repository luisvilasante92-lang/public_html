{% extends "base.html" %}
{% block title %}Новая платформа{% endblock %}
{% block page_title %}Добавление платформы{% endblock %}
{% block content %}
<form method="POST"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<div class="form-group"><label>Название *</label><input type="text" name="name" required class="form-control"></div>
<div class="form-group"><label>Категория *</label><select name="category" required class="form-control">{% for value, label in categories %}<option value="{{ value }}">{{ label }}</option>{% endfor %}</select></div>
<div class="form-group"><label>Предупреждение</label><input type="text" name="warning_message" class="form-control"></div>
<div class="form-group"><label>Порядок</label><input type="number" name="sort_order" value="0" class="form-control"></div>
<div class="form-actions"><a href="{{ url_for('admin.platforms') }}" class="btn btn-ghost">Отмена</a><button type="submit" class="btn btn-primary">Создать</button></div>
</form>
{% endblock %}
