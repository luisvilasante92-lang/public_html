<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новый ответ в обращении</title>
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background-color: #f1f5f9; color: #1a1a1a;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color: #f1f5f9;">
        <tr>
            <td align="center" style="padding: 40px 20px;">
                <table role="presentation" cellspacing="0" cellpadding="0" style="max-width: 560px; width: 100%; background: #ffffff; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.08), 0 2px 4px -2px rgba(0,0,0,0.06); border: 1px solid #e2e8f0;">
                    <tr>
                        <td style="padding: 24px 28px 20px; border-bottom: 1px solid #e2e8f0;">
                            <a href="{{ dashboard_url }}" style="text-decoration: none; display: inline-block;">
                                <img src="{{ logo_url }}" alt="LVR Music Publishing" width="160" height="38" style="display: block; max-width: 160px; height: auto;" />
                            </a>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 28px 28px 24px;">
                            <p style="margin: 0 0 16px; font-size: 15px; line-height: 1.6; color: #475569;">
                                Здравствуйте{% if author_name %}, {{ author_name }}{% endif %}!
                            </p>
                            <p style="margin: 0 0 20px; font-size: 15px; line-height: 1.6; color: #334155;">
                                В обращении <strong style="color: #1a1a1a;">{{ ticket_id }}</strong> появился новый ответ.
                            </p>
                            <p style="margin: 0 0 12px; font-size: 14px; line-height: 1.6; color: #475569;">
                                Тема: <strong>{{ subject }}</strong>
                            </p>
                            <div style="margin-bottom: 24px; padding: 16px; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
                                <p style="margin: 0 0 6px; font-size: 13px; font-weight: 600; color: #64748b;">Ответ:</p>
                                <p style="margin: 0; font-size: 14px; line-height: 1.6; color: #334155; white-space: pre-wrap;">{{ reply_preview }}</p>
                            </div>
                            <p style="margin: 0;">
                                <a href="{{ ticket_url }}" style="display: inline-block; padding: 12px 24px; background: linear-gradient(180deg, #84cc16 0%, #65a30d 100%); color: #ffffff !important; text-decoration: none; font-size: 14px; font-weight: 600; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">Перейти к обращению</a>
                            </p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 16px 28px 20px; border-top: 1px solid #e2e8f0; font-size: 12px; color: #94a3b8;">
                            Личный кабинет LVR Music Publishing
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
