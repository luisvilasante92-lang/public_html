{% extends "base.html" %}
{% block title %}Редактирование: {{ news.title }}{% endblock %}
{% block page_title %}Редактирование новости{% endblock %}
{% block content %}
<div class="card news-form-card">
    <div class="card-content">
        <form method="POST" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>Заголовок *</label>
                <input type="text" name="title" value="{{ news.title }}" required class="form-control">
            </div>
            <div class="form-group">
                <label>Содержание *</label>
                <textarea name="content" required class="form-control" rows="12">{{ news.content }}</textarea>
            </div>
            <div class="form-group">
                <label>Обложка</label>
                <input type="file" name="cover" accept=".jpg,.jpeg,.png,.gif,.webp" class="form-control">
                {% if news.cover_image %}<p class="form-hint">Текущая обложка будет заменена</p>{% endif %}
            </div>
            <div class="form-actions">
                <a href="{{ url_for('stories.view', id=news.id) }}" class="btn btn-ghost">Отмена</a>
                <button type="submit" class="btn btn-primary"><span class="material-icons">save</span> Сохранить</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
