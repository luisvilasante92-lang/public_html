{% extends "base.html" %}
{% block title %}Новый пользователь{% endblock %}
{% block page_title %}Создание пользователя{% endblock %}
{% block content %}
<form method="POST"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<div class="form-group"><label>Логин *</label><input type="text" name="login" required class="form-control"></div>
<div class="form-group"><label>Email *</label><input type="email" name="email" required class="form-control"></div>
<div class="form-group"><label>Имя *</label><input type="text" name="name" required class="form-control"></div>
<div class="form-group"><label>Роль *</label><select name="role" required class="form-control"><option value="artist">Артист</option><option value="label">Лейбл</option><option value="admin">Администратор</option></select></div>
<div class="form-group"><label>Пароль *</label><input type="password" name="password" required class="form-control"></div>
<div class="form-group"><label>Копирайт</label><input type="text" name="copyright" class="form-control"></div>
<div class="form-group"><label>Партнерский код (для лейбла)</label><input type="text" name="partner_code" class="form-control"></div>
<div class="form-actions"><a href="{{ url_for('users.index') }}" class="btn btn-ghost">Отмена</a><button type="submit" class="btn btn-primary">Создать</button></div>
</form>
{% endblock %}
