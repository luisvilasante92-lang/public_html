{% extends "base.html" %}
{% block title %}Смена пароля{% endblock %}
{% block page_title %}Смена пароля{% endblock %}
{% block content %}
<div class="profile-password-page uni-skin">
    <div class="profile-password-card card">
        <header class="card-header">
            <h3 class="card-header__title"><span class="material-icons">lock</span> Смена пароля</h3>
            <a href="{{ url_for('profile.index') }}" class="btn btn-ghost btn-sm">← Назад</a>
        </header>
        <div class="card-content">
            <form method="POST" class="profile-password-form">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="form-group">
                    <label for="current_password">Текущий пароль <span class="required">*</span></label>
                    <input type="password" name="current_password" id="current_password" required class="form-control" placeholder="Введите текущий пароль" autocomplete="current-password">
                </div>
                <div class="form-group">
                    <label for="new_password">Новый пароль <span class="required">*</span></label>
                    <input type="password" name="new_password" id="new_password" required class="form-control" placeholder="Введите новый пароль" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="confirm_password">Подтверждение пароля <span class="required">*</span></label>
                    <input type="password" name="confirm_password" id="confirm_password" required class="form-control" placeholder="Повторите новый пароль" autocomplete="new-password">
                </div>
                <p class="form-hint">Минимум 8 символов, заглавная и строчная буквы, цифра, спецсимвол</p>

                <div class="form-actions">
                    <a href="{{ url_for('profile.index') }}" class="btn btn-ghost">Отмена</a>
                    <button type="submit" class="btn btn-primary">
                        <span class="material-icons">lock_reset</span>
                        Сменить пароль
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
